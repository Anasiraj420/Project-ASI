<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Application Security Inspector</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 500px;
            margin: 60px auto;
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #2c3e50;
        }

        h3 {
            color: #34495e;
            margin-top: 20px;
        }

        input[type="file"],
        input[type="text"] {
            width: 100%;
            padding: 8px;
            margin-top: 8px;
        }

        button {
            width: 100%;
            margin-top: 25px;
            padding: 12px;
            background: #3498db;
            color: white;
            border: none;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
        }

        button:hover {
            background: #2980b9;
        }

        .footer {
            text-align: center;
            margin-top: 15px;
            font-size: 12px;
            color: #777;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Application Security Inspector</h1>

    <form action="/scan" method="post" enctype="multipart/form-data">

        <h3>🔍 Static Code Analysis</h3>
        <input type="file" name="code_files" multiple>

        <h3>🌐 Dynamic Web Analysis</h3>
        <input type="text" name="target_url" placeholder="http://example.com">

        <button type="submit">Start Security Scan</button>
    </form>

    <div class="footer">
        Final Year Project | OWASP Top 10 (Basic)
    </div>
</div>

</body>
</html>
