<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Scan Report</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 800px;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #2c3e50;
        }

        .vuln {
            border-left: 5px solid #ccc;
            padding: 12px;
            margin-bottom: 15px;
            background: #fafafa;
        }

        .High {
            border-color: #e74c3c;
        }

        .Medium {
            border-color: #f39c12;
        }

        .Low {
            border-color: #27ae60;
        }

        .label {
            font-weight: bold;
            color: #555;
        }

        .back-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 15px;
            background: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 4px;
        }

        .back-btn:hover {
            background: #2980b9;
        }

        .no-issue {
            text-align: center;
            color: #27ae60;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Vulnerability Scan Report</h1>

    {% if results %}
        {% for r in results %}
            <div class="vuln {{ r.severity }}">
                <p><span class="label">Issue:</span> {{ r.issue }}</p>
                <p><span class="label">Severity:</span> {{ r.severity }}</p>
                <p><span class="label">Description:</span> {{ r.description }}</p>
            </div>
        {% endfor %}
    {% else %}
        <p class="no-issue">✅ No vulnerabilities found</p>
    {% endif %}

    <a class="back-btn" href="/">← Back to Scan</a>
</div>

</body>
</html>
